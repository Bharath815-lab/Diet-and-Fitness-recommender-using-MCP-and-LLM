<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness AI Assistant | Personalized Workout & Nutrition Plans</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>Fitness AI Assistant</h1>
            <p class="subtitle">Get personalized workout and nutrition recommendations powered by AI</p>
        </div>

        <form action="/predict" method="post" class="fitness-form">
            <div class="form-section">
                <h2 class="section-title">
                    <span class="icon">👤</span>
                    Personal Information
                </h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select name="gender" id="gender" required class="form-input">
                            <option value="">Select Gender</option>
                            <option value="1">Male</option>
                            <option value="0">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" name="age" id="age" placeholder="Enter your age" required class="form-input" min="1" max="120">
                    </div>
                    <div class="form-group">
                        <label for="height">Height (cm)</label>
                        <input type="number" name="height" id="height" placeholder="e.g., 175" required class="form-input" min="50" max="250" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" name="weight" id="weight" placeholder="e.g., 70" required class="form-input" min="20" max="300" step="0.1">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">
                    <span class="icon">💪</span>
                    Workout Details
                </h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="duration">Workout Duration (minutes)</label>
                        <input type="number" name="duration" id="duration" placeholder="e.g., 60" required class="form-input" min="1" max="600">
                    </div>
                    <div class="form-group">
                        <label for="heart_rate">Heart Rate (bpm)</label>
                        <input type="number" name="heart_rate" id="heart_rate" placeholder="e.g., 150" required class="form-input" min="40" max="220">
                    </div>
                    <div class="form-group full-width">
                        <label for="body_temp">Body Temperature (°C)</label>
                        <input type="number" name="body_temp" id="body_temp" placeholder="e.g., 37.0" required class="form-input" min="35" max="42" step="0.1">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">
                    <span class="icon">🎯</span>
                    Fitness Goal
                </h2>
                <div class="form-group full-width">
                    <label for="goal">Describe your fitness goal</label>
                    <textarea name="goal" id="goal" placeholder="e.g., I want to lose 5kg in 3 months and build muscle. I prefer high-protein meals and can work out 4 times a week..." rows="5" required class="form-input"></textarea>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                <span class="btn-text">Generate My Personalized Plan</span>
                <span class="btn-icon">🚀</span>
            </button>
        </form>
    </div>

    <script>
        // Add smooth form interactions
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.classList.remove('focused');
                }
            });
        });

        // Form validation feedback
        document.querySelector('.fitness-form').addEventListener('submit', function(e) {
            const submitBtn = document.querySelector('.submit-btn');
            submitBtn.classList.add('loading');
            submitBtn.querySelector('.btn-text').textContent = 'Generating your plan...';
        });
    </script>
</body>
</html>
