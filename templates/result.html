<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Fitness Plan | Results</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <div class="container result-container">
        <div class="header">
            <div class="logo">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>Your Personalized Fitness Plan</h1>
            <p class="subtitle">Tailored recommendations just for you</p>
        </div>

        <div class="result-content">
            <div class="result-card">
                <div class="result-header">
                    <h2>
                        <span class="icon">📊</span>
                        AI Recommendations
                    </h2>
                </div>
                <div class="result-body">
                    <div class="result-text markdown-body">
                        {{ result | safe }}
                    </div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <a href="/fitness-form" class="btn-primary">
                <span class="btn-icon">←</span>
                <span>Create New Plan</span>
            </a>
            <button onclick="window.print()" class="btn-secondary">
                <span class="btn-icon">🖨️</span>
                <span>Print Plan</span>
            </button>
        </div>
    </div>

    <script>
        // Format result text with better styling
        
        // Add fade-in animation
        document.querySelector('.result-card').style.opacity = '0';
        setTimeout(() => {
            document.querySelector('.result-card').style.transition = 'opacity 0.6s ease-in';
            document.querySelector('.result-card').style.opacity = '1';
        }, 100);
    </script>
</body>
</html>
